<!--
  Mermaid-Unterstützung für GitHub Pages.

  kramdown (der Markdown-Prozessor von Jekyll) rendert ```mermaid-Blöcke nur als
  <pre><code class="language-mermaid">…</code></pre> und nicht als Diagramm.
  Dieses Skript lädt mermaid.js, wandelt diese Blöcke in das von mermaid erwartete
  Format um und rendert sie clientseitig.
-->
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

  // Diagramm-Theme an die Hell-/Dunkel-Einstellung des Browsers/OS koppeln.
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

  mermaid.initialize({
    startOnLoad: false,
    // 'loose' wird benötigt, damit die click-Direktiven mit externen URLs funktionieren.
    securityLevel: 'loose',
    theme: prefersDark ? 'dark' : 'default',
    // SVG an die (ggf. per wide-pre/extra-wide-pre verbreiterte) Containerbreite anpassen.
    flowchart: { useMaxWidth: true },
  });

  // Die von kramdown erzeugten Code-Blöcke in <pre class="mermaid">…</pre> umwandeln.
  // wide-pre / extra-wide-pre: IAL am .highlighter-rouge-Wrapper oder direkt am <pre> (Mermaid).
  document.querySelectorAll('pre > code.language-mermaid').forEach((code) => {
    const pre = code.parentElement;
    const wrapper = pre.closest('.highlighter-rouge');
    const isExtraWide = wrapper?.classList.contains('extra-wide-pre') || pre.classList.contains('extra-wide-pre');
    const isWide = wrapper?.classList.contains('wide-pre') || pre.classList.contains('wide-pre');
    if (isExtraWide && wrapper) {
      wrapper.classList.add('extra-wide-pre');
    } else if (isWide && wrapper) {
      wrapper.classList.add('wide-pre');
    }
    const widthClass = isExtraWide ? 'extra-wide-pre' : (isWide ? 'wide-pre' : '');
    pre.className = widthClass ? `mermaid ${widthClass}` : 'mermaid';
    pre.textContent = code.textContent;
  });

  await mermaid.run();
</script>
